<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #1a1a1c;
      --surface2: #242426;
      --border: #2e2e32;
      --accent: #e8c96d;
      --accent2: #5b9bd5;
      --text: #e8e8e8;
      --muted: #888888;
      --green: #4caf6b;
      --red: #e05555;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
    }

    .app-wrapper {
      display: flex;
      gap: 24px;
      padding: 24px;
      align-items: flex-start;
    }

    /* ---- LEFT COLUMN ---- */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 500px;
      flex-shrink: 0;
    }

    .board-container {
      position: relative;
      width: 500px;
      height: 500px;
      border-radius: var(--radius);
    }

    #board-canvas {
      display: block;
      cursor: pointer;
    }

    #arrow-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .controls-bar button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 14px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s;
    }

    .controls-bar button:hover {
      background: var(--border);
    }

    .controls-bar button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .move-counter {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .engine-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #engine-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #engine-dot.loading   { background: var(--muted); }
    #engine-dot.ready     { background: var(--green); }
    #engine-dot.analysing { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    #engine-dot.complete  { background: var(--green); }
    #engine-dot.error     { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    #engine-status-label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Eval bar */
    .eval-bar-container {
      position: relative;
      height: 22px;
      width: 100%;
      background: var(--surface2);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Blue (black advantage) is the right portion; gold (white advantage) fills from left */
    .eval-bar-black {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 50%;
      background: var(--accent2);
      transition: width 0.35s ease;
    }

    #eval-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 50%;
      background: var(--accent);
      transition: width 0.35s ease;
    }

    #eval-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: #111;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 3px rgba(255,255,255,0.4);
    }

    /* Move list */
    #move-list {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      align-items: center;
      min-height: 28px;
    }

    .move-number-label {
      font-size: 11px;
      color: var(--muted);
      padding: 3px 2px;
      align-self: center;
      font-family: 'IBM Plex Mono', monospace;
      user-select: none;
    }

    .move-chip {
      padding: 3px 9px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      border: 1px solid transparent;
      user-select: none;
      transition: border-color 0.1s, background 0.1s;
    }

    .move-chip.white-move {
      background: var(--surface2);
      color: var(--text);
    }

    .move-chip.black-move {
      background: var(--surface);
      color: var(--text);
    }

    .move-chip:hover {
      background: var(--border);
    }

    .move-chip.active {
      border-color: var(--accent);
    }

    /* FEN display */
    #fen-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      word-break: break-all;
      line-height: 1.4;
    }

    /* PGN section */
    .pgn-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pgn-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    #pgn-input {
      width: 100%;
      height: 80px;
      resize: vertical;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      border-radius: var(--radius);
      padding: 7px 8px;
      transition: border-color 0.15s;
    }

    #pgn-input:focus {
      outline: none;
      border-color: var(--accent2);
    }

    #btn-load-pgn {
      align-self: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    #btn-load-pgn:hover {
      background: var(--border);
    }

    /* ---- RIGHT COLUMN ---- */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      min-width: 280px;
      max-width: 440px;
    }

    .engine-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-header {
      font-weight: 600;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    #best-move-display {
      font-size: 13px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 18px;
    }

    #best-move-display .bm-label {
      color: var(--muted);
      font-size: 11px;
    }

    #best-move-display .bm-value {
      color: var(--accent);
      font-weight: 600;
    }

  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- LEFT COLUMN -->
  <div class="left-col">

    <div class="board-container">
      <canvas id="board-canvas" width="500" height="500"></canvas>
      <canvas id="arrow-canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls-bar">
      <button id="btn-start" title="Start">⏮</button>
      <button id="btn-prev"  title="Previous">◀</button>
      <button id="btn-next"  title="Next">▶</button>
      <button id="btn-end"   title="End">⏭</button>
      <button id="btn-hint"  title="Show best move">Hint</button>
      <span class="move-counter" id="move-counter">0 / 0</span>
      <div class="engine-status">
        <span id="engine-dot" class="loading"></span>
        <span id="engine-status-label">Loading engine...</span>
      </div>
    </div>

    <div class="eval-bar-container">
      <div class="eval-bar-black"></div>
      <div id="eval-fill"></div>
      <span id="eval-label">0.0</span>
    </div>

    <div id="move-list"></div>

    <div id="fen-display"></div>

    <div class="pgn-section">
      <span class="pgn-label">Paste PGN</span>
      <textarea id="pgn-input" placeholder="[Event &quot;Test Game&quot;]&#10;[White &quot;Player1&quot;]&#10;[Black &quot;Player2&quot;]&#10;&#10;1. e4 e5 2. Nf3 ..."></textarea>
      <button id="btn-load-pgn">Load Game</button>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right-col">

    <div class="engine-panel">
      <div class="panel-header">Engine Analysis</div>
      <div id="best-move-display"><span class="bm-label">Best move: </span><span class="bm-value" id="bm-value">—</span></div>
    </div>

  </div>

</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────

const LIGHT_SQ        = '#f0d9b5';
const DARK_SQ         = '#b58863';
const HIGHLIGHT_LIGHT = '#cdd16e';
const HIGHLIGHT_DARK  = '#aaa23a';
const SQ              = 60; // logical pixels per square
const BOARD_SIZE      = 480;
const MARGIN          = 20;
const FILES           = 'abcdefgh';

const GLYPHS = {
  wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙',
  bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟'
};

const PIECE_IMGS = {};
const PIECE_KEYS = ['wK','wQ','wR','wB','wN','wP','bK','bQ','bR','bB','bN','bP'];

// ─── State ────────────────────────────────────────────────────────────────────

let allFens          = [];
let allMoves         = [];
let currentIdx       = 0;
let sfWorker         = null;
let sfReady          = false;
let currentEvalScore = null;  // number (pawns, white-relative) or null
let currentBestMove  = '';    // UCI string
let selectedSq       = null;  // currently selected square name e.g. 'e2'
let legalDestSquares = [];    // legal destination squares for selected piece

let hintActive       = false;  // true while hint arrow is visible
let hintPending      = false;  // true when hint was pressed but bestmove not yet received

// Drag-and-drop state
let isDragging       = false;
let dragSq           = null;
let dragPiece        = null;
let dragX            = 0;
let dragY            = 0;
let _dragStartSq     = null;
let _dragStartPiece  = null;
let _dragStartX      = 0;
let _dragStartY      = 0;
let _suppressClick   = false;

// ─── Canvas setup ─────────────────────────────────────────────────────────────

const boardCanvas = document.getElementById('board-canvas');
const arrowCanvas = document.getElementById('arrow-canvas');
const bCtx        = boardCanvas.getContext('2d');
const aCtx        = arrowCanvas.getContext('2d');

(function initCanvases() {
  const dpr  = window.devicePixelRatio || 1;
  const size = BOARD_SIZE + MARGIN; // 500
  [boardCanvas, arrowCanvas].forEach(c => {
    c.width        = size * dpr;
    c.height       = size * dpr;
    c.style.width  = size + 'px';
    c.style.height = size + 'px';
  });
  bCtx.scale(dpr, dpr);
  aCtx.scale(dpr, dpr);
})();

// ─── Coordinate helpers ───────────────────────────────────────────────────────

function sqToColRow(sq) {
  return { col: FILES.indexOf(sq[0]), row: 8 - parseInt(sq[1]) };
}

function sqToCenter(sq) {
  const { col, row } = sqToColRow(sq);
  return { x: col * SQ + SQ / 2, y: row * SQ + SQ / 2 };
}

// ─── Piece image loader ───────────────────────────────────────────────────────

function loadPieceImages() {
  return Promise.all(PIECE_KEYS.map(key => new Promise(resolve => {
    const img   = new Image();
    img.onload  = () => { PIECE_IMGS[key] = img; resolve(); };
    img.onerror = () => resolve(); // Unicode fallback if CDN unreachable
    img.src     = `https://lichess1.org/assets/piece/cburnett/${key}.svg`;
  })));
}

// ─── Board rendering ──────────────────────────────────────────────────────────

function renderBoard(fen, lastFrom, lastTo) {
  const chessInst = new Chess(fen);
  const board     = chessInst.board(); // [0][0] = a8
  const total     = BOARD_SIZE + MARGIN; // 500

  bCtx.clearRect(0, 0, total, total);

  // Pass 1: squares + pieces
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const sqName  = FILES[col] + (8 - row);
      const isLight = (row + col) % 2 === 0;
      let   color   = isLight ? LIGHT_SQ : DARK_SQ;

      if (sqName === lastFrom || sqName === lastTo) {
        color = isLight ? HIGHLIGHT_LIGHT : HIGHLIGHT_DARK;
      }
      if (sqName === selectedSq) {
        color = isLight ? '#a9c4e8' : '#7ea5cf';
      }

      bCtx.fillStyle = color;
      bCtx.fillRect(col * SQ, row * SQ, SQ, SQ);

      const piece = board[row][col];
      // Skip the piece being dragged — it floats on the arrow canvas
      if (piece && !(isDragging && sqName === dragSq)) {
        const key = piece.color + piece.type.toUpperCase();
        if (PIECE_IMGS[key]) {
          bCtx.drawImage(PIECE_IMGS[key], col * SQ, row * SQ, SQ, SQ);
        } else {
          const glyph = GLYPHS[key];
          if (glyph) {
            bCtx.font         = `${SQ * 0.82}px 'Segoe UI Symbol', 'Apple Color Emoji', serif`;
            bCtx.textAlign    = 'center';
            bCtx.textBaseline = 'middle';
            bCtx.shadowColor  = 'rgba(0,0,0,0.55)';
            bCtx.shadowBlur   = 3;
            bCtx.fillStyle    = piece.color === 'w' ? '#fff' : '#1a1a1a';
            bCtx.fillText(glyph, col * SQ + SQ / 2, row * SQ + SQ / 2 + 1);
            bCtx.shadowBlur   = 0;
          }
        }
      }
    }
  }

  // Pass 2: legal move indicators (drawn after pieces for correct z-order)
  for (const dest of legalDestSquares) {
    const { col, row } = sqToColRow(dest);
    if (chessInst.get(dest)) {
      bCtx.beginPath();
      bCtx.arc(col * SQ + SQ / 2, row * SQ + SQ / 2, SQ / 2 - 3, 0, 2 * Math.PI);
      bCtx.strokeStyle = 'rgba(0,0,0,0.3)';
      bCtx.lineWidth   = 7;
      bCtx.stroke();
    } else {
      bCtx.beginPath();
      bCtx.arc(col * SQ + SQ / 2, row * SQ + SQ / 2, SQ * 0.17, 0, 2 * Math.PI);
      bCtx.fillStyle = 'rgba(0,0,0,0.2)';
      bCtx.fill();
    }
  }

  // Pass 3: coordinate labels in margin strips
  bCtx.font         = '12px IBM Plex Mono, monospace';
  bCtx.fillStyle    = '#888888';
  bCtx.shadowBlur   = 0;

  // File labels (a–h) along the bottom
  bCtx.textAlign    = 'center';
  bCtx.textBaseline = 'middle';
  for (let c = 0; c < 8; c++) {
    bCtx.fillText(FILES[c], c * SQ + SQ / 2, BOARD_SIZE + MARGIN / 2);
  }

  // Rank labels (8–1) along the right
  for (let r = 0; r < 8; r++) {
    bCtx.fillText(String(8 - r), BOARD_SIZE + MARGIN / 2, r * SQ + SQ / 2);
  }
}

// ─── Arrow drawing ────────────────────────────────────────────────────────────

function clearArrow() {
  aCtx.clearRect(0, 0, BOARD_SIZE + MARGIN, BOARD_SIZE + MARGIN);
}

function renderHintArrow(fromSq, toSq) {
  if (!fromSq || !toSq || fromSq === toSq) return;

  const from = sqToCenter(fromSq);
  const to   = sqToCenter(toSq);
  const dx   = to.x - from.x;
  const dy   = to.y - from.y;
  const len  = Math.sqrt(dx * dx + dy * dy);
  const ux   = dx / len, uy = dy / len;

  const startX = from.x + ux * SQ * 0.2;
  const startY = from.y + uy * SQ * 0.2;
  const endX   = to.x   - ux * SQ * 0.25;
  const endY   = to.y   - uy * SQ * 0.25;

  aCtx.strokeStyle = 'rgba(232,201,109,0.88)';
  aCtx.fillStyle   = 'rgba(232,201,109,0.88)';
  aCtx.lineWidth   = SQ * 0.15;
  aCtx.lineCap     = 'round';

  aCtx.beginPath();
  aCtx.moveTo(startX, startY);
  aCtx.lineTo(endX, endY);
  aCtx.stroke();

  const angle   = Math.atan2(dy, dx);
  const headLen = SQ * 0.35;
  const tipX    = to.x - ux * SQ * 0.1;
  const tipY    = to.y - uy * SQ * 0.1;

  aCtx.beginPath();
  aCtx.moveTo(tipX, tipY);
  aCtx.lineTo(tipX - headLen * Math.cos(angle - Math.PI / 6),
              tipY - headLen * Math.sin(angle - Math.PI / 6));
  aCtx.lineTo(tipX - headLen * Math.cos(angle + Math.PI / 6),
              tipY - headLen * Math.sin(angle + Math.PI / 6));
  aCtx.closePath();
  aCtx.fill();
}

// ─── Drag piece overlay ───────────────────────────────────────────────────────

function drawDragPiece() {
  if (!isDragging || !dragPiece) return;
  const key  = dragPiece.color + dragPiece.type.toUpperCase();
  const size = SQ * 1.15;
  if (PIECE_IMGS[key]) {
    aCtx.drawImage(PIECE_IMGS[key], dragX - size / 2, dragY - size / 2, size, size);
  } else {
    const glyph = GLYPHS[key];
    if (glyph) {
      aCtx.font         = `${size * 0.9}px 'Segoe UI Symbol', 'Apple Color Emoji', serif`;
      aCtx.textAlign    = 'center';
      aCtx.textBaseline = 'middle';
      aCtx.shadowColor  = 'rgba(0,0,0,0.55)';
      aCtx.shadowBlur   = 4;
      aCtx.fillStyle    = dragPiece.color === 'w' ? '#fff' : '#1a1a1a';
      aCtx.fillText(glyph, dragX, dragY + 1);
      aCtx.shadowBlur   = 0;
    }
  }
}

function renderArrow(fromSq, toSq) {
  clearArrow();
  if (!fromSq || !toSq || fromSq === toSq) return;

  const from = sqToCenter(fromSq);
  const to   = sqToCenter(toSq);

  const dx  = to.x - from.x;
  const dy  = to.y - from.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const ux  = dx / len;
  const uy  = dy / len;

  const startX = from.x + ux * SQ * 0.2;
  const startY = from.y + uy * SQ * 0.2;
  const endX   = to.x   - ux * SQ * 0.25;
  const endY   = to.y   - uy * SQ * 0.25;

  aCtx.strokeStyle = 'rgba(150,150,150,0.75)';
  aCtx.fillStyle   = 'rgba(150,150,150,0.75)';
  aCtx.lineWidth   = SQ * 0.15;
  aCtx.lineCap     = 'round';

  aCtx.beginPath();
  aCtx.moveTo(startX, startY);
  aCtx.lineTo(endX, endY);
  aCtx.stroke();

  // Arrowhead
  const angle   = Math.atan2(dy, dx);
  const headLen = SQ * 0.35;
  const tipX    = to.x - ux * SQ * 0.1;
  const tipY    = to.y - uy * SQ * 0.1;

  aCtx.beginPath();
  aCtx.moveTo(tipX, tipY);
  aCtx.lineTo(tipX - headLen * Math.cos(angle - Math.PI / 6),
              tipY - headLen * Math.sin(angle - Math.PI / 6));
  aCtx.lineTo(tipX - headLen * Math.cos(angle + Math.PI / 6),
              tipY - headLen * Math.sin(angle + Math.PI / 6));
  aCtx.closePath();
  aCtx.fill();
}

// ─── FEN display ─────────────────────────────────────────────────────────────

function updateFenDisplay() {
  document.getElementById('fen-display').textContent = allFens[currentIdx] || '';
}

// ─── Move counter ─────────────────────────────────────────────────────────────

function updateMoveCounter() {
  document.getElementById('move-counter').textContent =
    `${currentIdx} / ${allMoves.length}`;
}

// ─── renderPosition ───────────────────────────────────────────────────────────

function renderPosition() {
  const lastMove = currentIdx > 0 ? allMoves[currentIdx - 1] : null;
  renderBoard(allFens[currentIdx], lastMove ? lastMove.from : null, lastMove ? lastMove.to : null);
  renderArrow(lastMove ? lastMove.from : null, lastMove ? lastMove.to : null);
  if (hintActive && currentBestMove && currentBestMove.length >= 4) {
    renderHintArrow(currentBestMove.slice(0, 2), currentBestMove.slice(2, 4));
  }
  if (isDragging) drawDragPiece(); // floating piece on top of arrow layer
  updateFenDisplay();
  updateMoveCounter();
  updateMoveListHighlight();
}

// ─── Move list ────────────────────────────────────────────────────────────────

function buildMoveList() {
  const container = document.getElementById('move-list');
  container.innerHTML = '';

  allMoves.forEach((mv, i) => {
    if (i % 2 === 0) {
      const num = document.createElement('span');
      num.className = 'move-number-label';
      num.textContent = (i / 2 + 1) + '.';
      container.appendChild(num);
    }

    const chip = document.createElement('span');
    chip.className   = 'move-chip ' + (i % 2 === 0 ? 'white-move' : 'black-move');
    chip.textContent = mv.san;
    chip.dataset.idx = i + 1; // position index after this move
    chip.addEventListener('click', () => navigateTo(parseInt(chip.dataset.idx)));
    container.appendChild(chip);
  });
}

function updateMoveListHighlight() {
  document.querySelectorAll('.move-chip').forEach(chip => {
    chip.classList.toggle('active', parseInt(chip.dataset.idx) === currentIdx);
  });
}

// ─── Navigation ───────────────────────────────────────────────────────────────

function navigateTo(idx) {
  if (allFens.length === 0) return;
  currentIdx       = Math.max(0, Math.min(allFens.length - 1, idx));
  selectedSq       = null;
  legalDestSquares = [];
  hintActive       = false;
  hintPending      = false;
  renderPosition();
  analysePosition();
}

// ─── PGN loading ──────────────────────────────────────────────────────────────

function loadPgn() {
  const pgnText = document.getElementById('pgn-input').value.trim();
  if (!pgnText) { alert('Please paste a PGN first.'); return; }

  let tempChess;
  try {
    tempChess = new Chess();
    const ok  = tempChess.load_pgn(pgnText);
    if (!ok) { alert('Invalid PGN. Please check and try again.'); return; }
  } catch (e) {
    alert('Invalid PGN: ' + e.message);
    return;
  }

  allMoves = tempChess.history({ verbose: true });

  // Respect custom starting FEN from [SetUp "1"] + [FEN "..."] headers
  const headers  = tempChess.header();
  const startFen = (headers.SetUp === '1' && headers.FEN) ? headers.FEN : new Chess().fen();

  const walker = new Chess(startFen);
  allFens = [walker.fen()];
  for (const mv of allMoves) {
    walker.move(mv.san);
    allFens.push(walker.fen());
  }

  currentIdx = 0;
  buildMoveList();
  renderPosition();
  analysePosition();
}

// ─── Interactive piece movement ──────────────────────────────────────────────

function handleSquareClick(sq) {
  if (allFens.length === 0) return;

  const chessInst = new Chess(allFens[currentIdx]);
  const piece     = chessInst.get(sq);
  const turn      = chessInst.turn(); // 'w' or 'b'

  if (selectedSq === null) {
    // Select a piece belonging to the side to move
    if (piece && piece.color === turn) {
      selectedSq       = sq;
      legalDestSquares = chessInst.moves({ square: sq, verbose: true }).map(m => m.to);
      renderPosition();
    }
  } else {
    if (sq === selectedSq) {
      // Click same square — deselect
      selectedSq       = null;
      legalDestSquares = [];
      renderPosition();
    } else if (legalDestSquares.includes(sq)) {
      // Legal destination — make the move
      makeMove(selectedSq, sq);
    } else if (piece && piece.color === turn) {
      // Re-select a different piece of same colour
      selectedSq       = sq;
      legalDestSquares = chessInst.moves({ square: sq, verbose: true }).map(m => m.to);
      renderPosition();
    } else {
      // Clicked elsewhere — deselect
      selectedSq       = null;
      legalDestSquares = [];
      renderPosition();
    }
  }
}

function makeMove(from, to) {
  const chessInst = new Chess(allFens[currentIdx]);
  const move      = chessInst.move({ from, to, promotion: 'q' }); // auto-queen promotion
  if (!move) return;

  // Truncate game from current position and append the new move
  allFens  = allFens.slice(0, currentIdx + 1);
  allMoves = allMoves.slice(0, currentIdx);
  allFens.push(chessInst.fen());
  allMoves.push(move);

  currentIdx++;
  selectedSq       = null;
  legalDestSquares = [];
  hintActive       = false;
  hintPending      = false;
  buildMoveList();
  renderPosition();
  analysePosition();
}

// ─── Engine status dot ───────────────────────────────────────────────────────

const ENGINE_LABELS = {
  loading:   'Loading engine...',
  ready:     'Engine ready',
  analysing: 'Analysing...',
  complete:  'Analysis complete',
  error:     'Engine unavailable'
};

function engineDot(state) {
  const dot   = document.getElementById('engine-dot');
  const label = document.getElementById('engine-status-label');
  dot.className = state;
  label.textContent = ENGINE_LABELS[state] || '';
}

// ─── Eval bar ─────────────────────────────────────────────────────────────────

function evalToPercent(score) {
  // score in pawns, white-relative; clamp to ±10
  return 50 + Math.max(-10, Math.min(10, score)) * 5;
}

function updateEvalBar(scoreWhiteRelative, labelOverride) {
  const pct   = evalToPercent(scoreWhiteRelative);
  const fill  = document.getElementById('eval-fill');
  const lbl   = document.getElementById('eval-label');
  const black = document.querySelector('.eval-bar-black');

  fill.style.width  = pct + '%';
  black.style.width = (100 - pct) + '%';

  if (labelOverride) {
    lbl.textContent = labelOverride;
  } else {
    const s = scoreWhiteRelative;
    lbl.textContent = (s > 0 ? '+' : '') + s.toFixed(1);
  }

  currentEvalScore = labelOverride || scoreWhiteRelative;
}

function resetEvalBar() {
  document.getElementById('eval-fill').style.width        = '50%';
  document.querySelector('.eval-bar-black').style.width   = '50%';
  document.getElementById('eval-label').textContent       = '0.0';
}

// ─── Built-in minimax engine (hint fallback, no CDN) ─────────────────────────

(function() {
  const VAL = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 0 };

  // Piece-square tables (white's perspective, index 0 = a8 row)
  const PST_P = [
     0,  0,  0,  0,  0,  0,  0,  0,
    50, 50, 50, 50, 50, 50, 50, 50,
    10, 10, 20, 30, 30, 20, 10, 10,
     5,  5, 10, 25, 25, 10,  5,  5,
     0,  0,  0, 20, 20,  0,  0,  0,
     5, -5,-10,  0,  0,-10, -5,  5,
     5, 10, 10,-20,-20, 10, 10,  5,
     0,  0,  0,  0,  0,  0,  0,  0
  ];
  const PST_N = [
    -50,-40,-30,-30,-30,-30,-40,-50,
    -40,-20,  0,  0,  0,  0,-20,-40,
    -30,  0, 10, 15, 15, 10,  0,-30,
    -30,  5, 15, 20, 20, 15,  5,-30,
    -30,  0, 15, 20, 20, 15,  0,-30,
    -30,  5, 10, 15, 15, 10,  5,-30,
    -40,-20,  0,  5,  5,  0,-20,-40,
    -50,-40,-30,-30,-30,-30,-40,-50
  ];
  const PST_B = [
    -20,-10,-10,-10,-10,-10,-10,-20,
    -10,  0,  0,  0,  0,  0,  0,-10,
    -10,  0,  5, 10, 10,  5,  0,-10,
    -10,  5,  5, 10, 10,  5,  5,-10,
    -10,  0, 10, 10, 10, 10,  0,-10,
    -10, 10, 10, 10, 10, 10, 10,-10,
    -10,  5,  0,  0,  0,  0,  5,-10,
    -20,-10,-10,-10,-10,-10,-10,-20
  ];

  function staticEval(chess) {
    if (chess.in_checkmate()) return chess.turn() === 'w' ? -9999 : 9999;
    if (chess.in_draw())      return 0;
    let score = 0;
    chess.board().forEach((row, ri) => row.forEach((p, ci) => {
      if (!p) return;
      const idx  = ri * 8 + ci;
      const flip = p.color === 'b' ? (7 - ri) * 8 + ci : idx;
      let v = (VAL[p.type] || 0);
      if (p.type === 'p') v += PST_P[flip];
      if (p.type === 'n') v += PST_N[flip];
      if (p.type === 'b') v += PST_B[flip];
      score += p.color === 'w' ? v : -v;
    }));
    return score;
  }

  function alphabeta(chess, depth, alpha, beta, maxing) {
    if (depth === 0 || chess.game_over()) return staticEval(chess);
    const moves = chess.moves();
    if (maxing) {
      for (const m of moves) {
        chess.move(m);
        const s = alphabeta(chess, depth - 1, alpha, beta, false);
        chess.undo();
        if (s > alpha) alpha = s;
        if (beta <= alpha) break;
      }
      return alpha;
    } else {
      for (const m of moves) {
        chess.move(m);
        const s = alphabeta(chess, depth - 1, alpha, beta, true);
        chess.undo();
        if (s < beta) beta = s;
        if (beta <= alpha) break;
      }
      return beta;
    }
  }

  window.builtinBestMove = function(fen) {
    const chess = new Chess(fen);
    if (chess.game_over()) return null;
    const isWhite = chess.turn() === 'w';
    const moves   = chess.moves({ verbose: true });
    let bestMove  = moves[0];
    let bestScore = isWhite ? -Infinity : Infinity;
    for (const mv of moves) {
      chess.move(mv);
      const s = alphabeta(chess, 3, -Infinity, Infinity, !isWhite);
      chess.undo();
      if (isWhite ? s > bestScore : s < bestScore) {
        bestScore = s;
        bestMove  = mv;
      }
    }
    return bestMove ? bestMove.from + bestMove.to : null;
  };
})();

// ─── UCI → SAN helper ────────────────────────────────────────────────────────

function uciToSan(uci, fen) {
  try {
    const c   = new Chess(fen);
    const res = c.move({ from: uci.slice(0,2), to: uci.slice(2,4), promotion: uci[4] || undefined });
    return res ? res.san : uci;
  } catch (_) { return uci; }
}

// ─── Stockfish ────────────────────────────────────────────────────────────────

async function initStockfish() {
  engineDot('loading');
  try {
    sfWorker = new Worker('stockfish.js');
    sfWorker.onmessage = e => handleSfMessage(e.data);
    sfWorker.onerror   = () => engineDot('error');
    sfWorker.postMessage('uci');
  } catch (_) {
    engineDot('error');
  }
}

function handleSfMessage(line) {
  if (typeof line !== 'string') return;

  if (line.includes('uciok')) {
    sfWorker.postMessage('isready');
    return;
  }

  if (line.includes('readyok')) {
    sfReady = true;
    engineDot('ready');
    analysePosition();
    return;
  }

  if (line.startsWith('info') && line.includes('score')) {
    // Determine side to move from current FEN
    const fen      = allFens[currentIdx] || '';
    const isBlack  = fen.split(' ')[1] === 'b';

    const cpMatch  = line.match(/score cp (-?\d+)/);
    const mateMatch = line.match(/score mate (-?\d+)/);

    if (cpMatch) {
      // Stockfish score is relative to side-to-move; normalise to white's POV
      let score = parseInt(cpMatch[1]) / 100;
      if (isBlack) score = -score;
      updateEvalBar(score);
    }

    if (mateMatch) {
      let n = parseInt(mateMatch[1]);
      // Positive = side-to-move mates; normalise to white's POV
      if (isBlack) n = -n;
      const label = n > 0 ? 'M' + n : '-M' + Math.abs(n);
      updateEvalBar(n > 0 ? 99 : -99, label);
    }
  }

  if (line.startsWith('bestmove')) {
    const parts = line.split(' ');
    const bm    = parts[1];

    if (!bm || bm === '(none)') {
      document.getElementById('bm-value').textContent = 'Game over';
      engineDot('complete');
      return;
    }

    currentBestMove = bm;
    const san = uciToSan(bm, allFens[currentIdx]);
    document.getElementById('bm-value').textContent = san;
    engineDot('complete');

    // If hint was pressed while engine was still analysing, show now
    if (hintPending) {
      hintPending = false;
      hintActive  = true;
      renderPosition();
    }
  }
}

function analysePosition() {
  if (!sfReady || allFens.length === 0) return;

  engineDot('analysing');
  currentEvalScore = null;
  currentBestMove  = '';
  hintActive       = false;
  document.getElementById('bm-value').textContent = '—';
  resetEvalBar();

  sfWorker.postMessage('stop');
  sfWorker.postMessage('position fen ' + allFens[currentIdx]);
  sfWorker.postMessage('go movetime 1500');
}

// ─── Initialise ───────────────────────────────────────────────────────────────

function resetToStart() {
  const starter = new Chess();
  allFens  = [starter.fen()];
  allMoves = [];
  currentIdx = 0;
}

function init() {
  resetToStart();
  renderPosition(); // immediate render (Unicode fallback until images load)
  loadPieceImages().then(() => renderPosition()); // re-render with SVG pieces
  initStockfish();

  // Button event listeners
  document.getElementById('btn-start').addEventListener('click', () => navigateTo(0));
  document.getElementById('btn-prev').addEventListener('click',  () => navigateTo(currentIdx - 1));
  document.getElementById('btn-next').addEventListener('click',  () => navigateTo(currentIdx + 1));
  document.getElementById('btn-end').addEventListener('click',   () => navigateTo(allFens.length - 1));
  document.getElementById('btn-load-pgn').addEventListener('click', loadPgn);
  document.getElementById('btn-hint').addEventListener('click', () => {
    if (allFens.length === 0) return;
    if (currentBestMove) {
      // Stockfish already has a result — show immediately
      hintActive = true;
      renderPosition();
    } else if (sfReady) {
      // Engine is ready but still analysing — wait for bestmove
      hintPending = true;
    } else {
      // Engine unavailable — fall back to built-in minimax
      const uci = builtinBestMove(allFens[currentIdx]);
      if (uci) { currentBestMove = uci; hintActive = true; renderPosition(); }
    }
  });

  // ─── Drag-and-drop ────────────────────────────────────────────────────────

  boardCanvas.addEventListener('mousedown', e => {
    if (allFens.length === 0) return;
    const rect = boardCanvas.getBoundingClientRect();
    const x    = e.clientX - rect.left;
    const y    = e.clientY - rect.top;
    const col  = Math.floor(x / SQ);
    const row  = Math.floor(y / SQ);
    if (col < 0 || col > 7 || row < 0 || row > 7) return;
    const sq         = FILES[col] + (8 - row);
    const chessInst  = new Chess(allFens[currentIdx]);
    const piece      = chessInst.get(sq);
    if (piece && piece.color === chessInst.turn()) {
      _dragStartSq    = sq;
      _dragStartPiece = piece;
      _dragStartX     = x;
      _dragStartY     = y;
    }
  });

  document.addEventListener('mousemove', e => {
    if (!_dragStartSq) return;
    const rect = boardCanvas.getBoundingClientRect();
    const x    = e.clientX - rect.left;
    const y    = e.clientY - rect.top;
    if (!isDragging) {
      const dx = x - _dragStartX, dy = y - _dragStartY;
      if (dx * dx + dy * dy < 25) return; // threshold 5px
      isDragging        = true;
      dragSq            = _dragStartSq;
      dragPiece         = _dragStartPiece;
      selectedSq        = dragSq;
      legalDestSquares  = new Chess(allFens[currentIdx])
                            .moves({ square: dragSq, verbose: true })
                            .map(m => m.to);
      boardCanvas.style.cursor = 'grabbing';
    }
    dragX = x;
    dragY = y;
    renderPosition();
  });

  document.addEventListener('mouseup', e => {
    if (!isDragging) {
      _dragStartSq = null; _dragStartPiece = null;
      return;
    }
    const rect   = boardCanvas.getBoundingClientRect();
    const x      = e.clientX - rect.left;
    const y      = e.clientY - rect.top;
    const col    = Math.floor(x / SQ);
    const row    = Math.floor(y / SQ);
    const dropSq = (col >= 0 && col <= 7 && row >= 0 && row <= 7)
                    ? FILES[col] + (8 - row) : null;

    isDragging   = false;
    dragPiece    = null;
    const fromSq = dragSq;
    dragSq       = null;
    _dragStartSq = null; _dragStartPiece = null;
    boardCanvas.style.cursor = 'pointer';
    _suppressClick = true;

    if (dropSq && legalDestSquares.includes(dropSq)) {
      makeMove(fromSq, dropSq);
    } else {
      selectedSq       = null;
      legalDestSquares = [];
      renderPosition();
    }
  });

  // ─── Click (piece selection / click-to-move) ──────────────────────────────

  boardCanvas.addEventListener('click', e => {
    if (_suppressClick) { _suppressClick = false; return; }
    const rect = boardCanvas.getBoundingClientRect();
    const x    = e.clientX - rect.left;
    const y    = e.clientY - rect.top;
    const col  = Math.floor(x / SQ);
    const row  = Math.floor(y / SQ);
    if (col < 0 || col > 7 || row < 0 || row > 7) return;
    handleSquareClick(FILES[col] + (8 - row));
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'TEXTAREA' || tag === 'INPUT') return;
    if (e.key === 'ArrowLeft')  navigateTo(currentIdx - 1);
    if (e.key === 'ArrowRight') navigateTo(currentIdx + 1);
  });
}

init();
</script>
